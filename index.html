<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虎绿豆 - 随机帖子浏览</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8b8ba7;
            --shadow-light: 0 8px 32px rgba(102, 126, 234, 0.15);
            --shadow-hover: 0 20px 60px rgba(102, 126, 234, 0.25);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: var(--primary-gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(246, 147, 251, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(245, 87, 108, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(102, 126, 234, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 8s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 10s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 12s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 14s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 1s; }
        .particle:nth-child(10) { left: 95%; animation-delay: 3s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-light);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            width: 100%;
            opacity: 1;
            transform: translateY(0);
            transition: all var(--transition-smooth);
        }

        .card.fade-out {
            opacity: 0;
            transform: translateY(-30px);
        }

        .card.fade-in {
            animation: cardFadeIn 0.5s ease-out forwards;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid rgba(102, 126, 234, 0.08);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(102, 126, 234, 0.2);
        }

        .user-avatar-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-nick {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .user-level {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            margin-left: auto;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stat-icon {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        .card-body {
            padding: 1.5rem 2rem;
        }

        .card-content {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .card-content:empty {
            display: none;
        }

        .card-content:empty + .image-gallery {
            margin-top: 0;
        }

        .image-gallery {
            display: grid;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .image-gallery.single {
            grid-template-columns: 1fr;
        }

        .image-gallery.dual {
            grid-template-columns: repeat(2, 1fr);
        }

        .image-gallery.triple,
        .image-gallery.more {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
        }

        .image-gallery.triple .gallery-item:first-child,
        .image-gallery.more .gallery-item:first-child {
            grid-row: span 2;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 4/3;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-fast);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item .loading-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            color: var(--text-muted);
            gap: 0.5rem;
        }

        .loading-placeholder .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .gallery-item .error-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe3e3 100%);
            color: #e53e3e;
            gap: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .error-placeholder svg {
            width: 32px;
            height: 32px;
            opacity: 0.6;
        }

        .error-placeholder span {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .card-footer {
            padding: 1.5rem 2rem;
            background: rgba(102, 126, 234, 0.03);
            border-top: 1px solid rgba(102, 126, 234, 0.08);
        }

        .random-button {
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .random-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .random-button:hover::before {
            left: 100%;
        }

        .random-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .random-button:active {
            transform: translateY(0) scale(0.98);
            box-shadow: var(--shadow-light);
        }

        .random-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .random-button:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .random-button svg {
            width: 24px;
            height: 24px;
            transition: transform var(--transition-fast);
        }

        .random-button:hover svg {
            transform: rotate(180deg);
        }

        .random-button.loading svg {
            animation: spin 0.6s linear infinite;
        }

        .post-counter {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
        }

        @media (max-width: 767px) {
            body {
                padding: 1.5rem 1rem;
            }

            .header h1 {

            }

            .card-header,
            .card-body,
            .card-footer {

            }

            .card-title {

            }

            .card-stats {

                margin-top: 0.75rem;
                width: 100%;
                justify-content: flex-start;
            }

            .random-button {
                padding: 0.875rem 1.5rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.75rem;
            }

            .header p {

            }

            .card-header,
            .card-body,
            .card-footer {

            }

            .card-title {
                font-size: 1.1rem;
            }

            .user-avatar,
            .user-avatar-placeholder {

                height: 36px;
            }

            .user-nick {
                font-size: 0.9rem;
            }

            .card-content {
                font-size: 0.95rem;
            }

            .image-gallery.triple,
            .image-gallery.more {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }

            .image-gallery.triple .gallery-item:first-child,
            .image-gallery.more .gallery-item:first-child {
                grid-row: auto;
            }
        }
    </style>
</head>

                    "http://cdn.u1.huluxia.com/g4/M03/40/2D/rBAAdmK7iIOAX_gJAAHLxY4MVhs586.jpg"
                ],
                user: { nick: "摄影爱好者", avatar: "http://cdn.u1.huluxia.com/g4/M03/40/2D/rBAAdmK7iISAECPRAAHDyweTIkk644.jpg", level: 5 },
                hit: 876,
                commentCount: 19
            },
            {
                postID: 50779111,
                title: "养猫日记🐱",
                detail: "我家小猫咪今天学会开门了，我该怎么办在线等挺急的",
                images: [
                    "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VsiAJ-4iAACwIcVKGT4711.jpg",
                    "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VsiAPqFLAADJcZgsrls677.jpg",
                    "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VsmAC3gAAAMPGtkDFQI574.jpg",
                    "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VsmAGgmLAAD9x9ItpOI108.jpg",
                    "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VsqAUympAACu17M2GIM316.jpg"
                ],
                user: { nick: "铲屎官日记", avatar: "http://cdn.u1.huluxia.com/g4/M03/41/5F/rBAAdmK8VstAD6g6AAFfL4w0aVM50.jpg", level: 4 },
                hit: 1523,
                commentCount: 45
            }
        ];

        let currentPostID = null;
        let isAnimating = false;

        document.getElementById('postCounter').textContent = `共收录 ${posts.length} 篇帖子`;

        function getRandomPost() {
            let newPost;
            do {
                newPost = posts[Math.floor(Math.random() * posts.length)];
            } while (newPost.postID === currentPostID && posts.length > 1);
            return newPost;
        }

        function formatNumber(num) {
            if (num >= 10000) {
                return (num / 10000).toFixed(1) + 'w';
            }
            return num.toString();
        }

        function renderPost(post) {
            currentPostID = post.postID;

            document.getElementById('postTitle').textContent = post.title;
            document.getElementById('postContent').textContent = post.detail;
            document.getElementById('userNick').textContent = post.user.nick;
            document.getElementById('userLevel').textContent = `Lv.${post.user.level}`;
            document.getElementById('hitCount').textContent = formatNumber(post.hit);
            document.getElementById('commentCount').textContent = formatNumber(post.commentCount);
            document.getElementById('avatarLetter').textContent = post.user.nick.charAt(0).toUpperCase();

            const avatarImg = document.getElementById('userAvatar');
            avatarImg.src = post.user.avatar;
            avatarImg.onerror = function() {
                this.style.display = 'none';
                document.getElementById('avatarPlaceholder').style.display = 'flex';
            };

            const gallery = document.getElementById('imageGallery');
            gallery.innerHTML = '';

            const imageCount = post.images.length;
            let galleryClass = 'single';
            if (imageCount === 2) galleryClass = 'dual';
            else if (imageCount >= 3) galleryClass = 'more';

            gallery.className = `image-gallery ${galleryClass}`;

            post.images.forEach((imgUrl, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.style.animationDelay = `${index * 0.1}s`;

                item.innerHTML = `
                    <div class="loading-placeholder">
                        <div class="spinner"></div>
                        <span style="font-size: 0.7rem;">加载中</span>
                    </div>
                    <img src="${imgUrl}" alt="帖子图片 ${index + 1}" loading="lazy">
                `;

                const img = item.querySelector('img');
                const loadingPlaceholder = item.querySelector('.loading-placeholder');

                img.onload = function() {
                    loadingPlaceholder.style.display = 'none';
                };

                img.onerror = function() {
                    loadingPlaceholder.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <span>图片加载失败</span>
                    `;
                    loadingPlaceholder.className = 'error-placeholder';
                };

                gallery.appendChild(item);
            });
        }

        async function loadRandomPost() {
            if (isAnimating) return;

            const card = document.getElementById('postCard');
            const btn = document.getElementById('randomBtn');
            const btnText = document.getElementById('btnText');

            isAnimating = true;
            btn.disabled = true;
            btn.classList.add('loading');
            btnText.textContent = '切换中...';

            card.classList.add('fade-out');

            await new Promise(resolve => setTimeout(resolve, 350));

            const newPost = getRandomPost();
            renderPost(newPost);

            card.classList.remove('fade-out');
            card.classList.add('fade-in');

            await new Promise(resolve => setTimeout(resolve, 500));

            card.classList.remove('fade-in');
            btn.disabled = false;
            btn.classList.remove('loading');
            btnText.textContent = '随机一篇';
            isAnimating = false;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const initialPost = getRandomPost();
            renderPost(initialPost);
        });
    </script>
</body>
</html>
